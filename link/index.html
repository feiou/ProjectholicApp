<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Projectholic...</title>
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#121212" />
  <link rel="icon" type="image/png" href="../images/appIcon-20260112.png" />
  <link rel="apple-touch-icon" href="../images/appIcon-20260112.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/chrome.css" />
  <style>
    /* Override chrome.css default (flex-column): this page centers content. */
    body {
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .wrap {
      max-width: 480px;
      text-align: center;
    }

    .app-icon {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      margin-bottom: 28px;
    }

    p {
      color: var(--muted-ink);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .store-badge {
      display: inline-block;
      height: 52px;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.45));
      transition: transform 0.2s ease;
    }

    .store-badge:hover { transform: translateY(-2px); }
    .store-badge img { height: 100%; width: auto; }

    .home-link {
      color: var(--muted-ink);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(255, 140, 66, 0.4);
      padding-bottom: 1px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .home-link:hover {
      color: var(--ink);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="../images/appIcon-20260112.png" alt="Projectholic app icon" class="app-icon" />
    <span class="eyebrow" id="eyebrow">Opening Projectholic</span>
    <h1 id="heading">Launching the app...</h1>
    <p id="message">If Projectholic is installed, it should open in a moment.</p>

    <div class="actions">
      <a href="https://apps.apple.com/app/id6745497754" class="store-badge" target="_blank" rel="noopener">
        <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83&amp;releaseDate=1234567890" alt="Download on the App Store" />
      </a>
      <a href="/" class="home-link">Back to homepage</a>
    </div>
  </div>

  <script>
    // If the user is still on this page 3s after load, the app didn't open.
    // Switch to a clear "not installed" message and keep the App Store CTA.
    let appOpened = false;
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') appOpened = true;
    });

    setTimeout(() => {
      if (appOpened || document.hidden) return;
      document.getElementById('eyebrow').textContent = 'App not installed';
      document.getElementById('heading').textContent = 'Get Projectholic';
      document.getElementById('message').textContent = 'This link requires the Projectholic app. Download it free on the App Store.';
    }, 3000);
  </script>
</body>
</html>
