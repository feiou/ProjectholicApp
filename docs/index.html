  <style>

    :root {
      --ink: #f5f2ed;
      --muted-ink: rgba(245, 242, 237, 0.72);
      --accent: #ff8c42;
      --accent-soft: rgba(255, 140, 66, 0.18);
      --panel: rgba(255, 255, 255, 0.06);
      --panel-stroke: rgba(255, 255, 255, 0.12);
      --code-bg: rgba(255, 255, 255, 0.07);
      --header-h: 66px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top, #2b2b2b 0%, #161616 55%, #101010 100%);
      min-height: 100dvh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(18, 18, 18, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--panel-stroke);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
    }

    .brand img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .brand span {
      font-family: 'Bricolage Grotesque', 'Manrope', -apple-system, sans-serif;
      font-size: 1.03rem;
      letter-spacing: 0.02em;
      font-weight: 600;
    }

    .topbar small {
      color: var(--muted-ink);
      font-size: 0.83rem;
    }

    .topbar-right {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .lang-toggle {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .lang-btn {
      border: 0;
      color: var(--muted-ink);
      background: transparent;
      font: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      padding: 0.36rem 0.65rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .lang-btn.active {
      color: var(--ink);
      background: rgba(255, 140, 66, 0.24);
    }

    .support-link {
      color: var(--ink);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.42rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 140, 66, 0.12);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .support-link:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 140, 66, 0.2);
    }

    .layout {
      max-width: 1360px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 28px;
      padding: 24px;
      position: relative;
    }

    .layout::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.02);
    }

    .sidebar {
      position: sticky;
      top: calc(var(--header-h) + 16px);
      max-height: calc(100dvh - var(--header-h) - 32px);
      overflow: auto;
      background: linear-gradient(155deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));

    .content ul,

    .content hr {

    .content code {

    .sf-icon {
      display: inline-flex;

      justify-content: center;
      width: 1.35em;
      height: 1.35em;
      border-radius: 8px;
      background: rgba(255, 140, 66, 0.14);
      border: 1px solid rgba(255, 140, 66, 0.32);
      vertical-align: middle;
      margin: 0 0.08em;
    }

    .sf-icon img {
      width: 0.95em;
      height: 0.95em;

    .meta {

      color: var(--muted-ink);
      font-size: 0.86rem;

    .doc-disclaimer {
      margin-top: 16px;

      color: #cfe5ff;

      border-bottom: 1px dotted rgba(207, 229, 255, 0.65);
    }

    .loading,

      padding: 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);

    }

    .doc-section {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
      border-radius: 14px;
      padding: 16px 16px 14px;
      margin: 20px 0;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .doc-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      background: linear-gradient(90deg, rgba(255, 140, 66, 0.7), rgba(255, 165, 102, 0.3));
      opacity: 0.85;
    }

    .doc-section h2 {
      margin-top: 2px;
      color: #f7fbff;
    }

    .doc-section h3 {
      color: #e4efff;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        padding: 16px;
        gap: 14px;
      }

      .sidebar {
        position: static;
        max-height: none;
      }

      .content {
        padding: 22px 16px 24px;
      }
    }
  </style>
</head>

  <script>
    const iconMap = {

      'circle': 'material-symbols:radio-button-unchecked',
      'clock': 'material-symbols:schedule',
      'clock.fill': 'material-symbols:schedule',
      'doc.on.doc': 'material-symbols:content-copy',
      'ellipsis': 'material-symbols:more-horiz',
      'exclamationmark.icloud': 'mdi:cloud-alert-outline',
      'exclamationmark.triangle.fill': 'material-symbols:warning',
      'folder.fill': 'material-symbols:folder',
      'gear': 'material-symbols:settings',
      'hourglass': 'material-symbols:hourglass-top',
      'icloud': 'material-symbols:cloud',
      'icloud.and.arrow.down': 'material-symbols:cloud-download',
      'icloud.slash': 'material-symbols:cloud-off',
      'info.circle': 'material-symbols:info',
      'line.3.horizontal.decrease.circle': 'material-symbols:filter-alt',
      'location.fill': 'material-symbols:my-location',
      'lock.fill': 'material-symbols:lock',
      'minus.magnifyingglass': 'material-symbols:zoom-out',
      'pencil': 'material-symbols:edit',
      'person.2.arrow.trianglehead.counterclockwise': 'material-symbols:swap-horiz',
      'person.2.fill': 'material-symbols:groups',
      'person.fill': 'material-symbols:person',
      'plus': 'material-symbols:add',
      'plus.circle': 'material-symbols:add-circle-outline',
      'plus.circle.fill': 'material-symbols:add-circle',
      'plus.magnifyingglass': 'material-symbols:zoom-in',
      'questionmark.circle': 'material-symbols:help',
      'repeat': 'material-symbols:repeat',
      'repeat.1': 'material-symbols:repeat-one',
      'repeat.1.circle.fill': 'material-symbols:repeat-one',
      'repeat.circle.fill': 'material-symbols:repeat',
      'sparkles': 'material-symbols:auto-awesome',
      'square': 'material-symbols:check-box-outline-blank',
      'square.and.pencil': 'material-symbols:edit-square',
      'square.grid.2x2': 'material-symbols:grid-view',
      'star': 'material-symbols:star-outline',
      'star.fill': 'material-symbols:star',
      'tag': 'material-symbols:sell',
      'timer': 'material-symbols:timer',
      'trash': 'material-symbols:delete',
      'xmark': 'material-symbols:close',
      'xmark.circle': 'material-symbols:cancel',
      'xmark.circle.fill': 'material-symbols:cancel'
    };

    const nonIconCode = new Set(['default', 'overflow', 'recurring', 'TaskTypeIcon', '#tag']);

    function iconUrl(codeText) {
      const mapped = iconMap[codeText];
      if (!mapped) return null;
      return `https://api.iconify.design/${mapped}.svg?color=%23d9ecff&width=18&height=18`;
    }

    function slugify(text) {
      return text.toLowerCase().trim().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-');
    }

    function applyIconChips(container) {
      container.querySelectorAll('code').forEach((codeNode) => {
        const raw = codeNode.textContent.trim();
        if (!raw || nonIconCode.has(raw)) return;

        if (raw.includes('+')) {
          const parts = raw.split('+').map((part) => part.trim()).filter(Boolean);
          if (parts.length < 2 || parts.some((part) => !iconMap[part])) return;

          const group = document.createElement('span');
          group.style.display = 'inline-flex';
          group.style.alignItems = 'center';
          group.style.gap = '0.2em';
          group.title = raw;
          parts.forEach((part, index) => {
            const chip = document.createElement('span');
            chip.className = 'sf-icon';

            const img = document.createElement('img');
            img.src = iconUrl(part);
            img.alt = `${part} icon`;
            img.loading = 'lazy';
            chip.append(img);
            group.appendChild(chip);

            if (index < parts.length - 1) {
              const dot = document.createElement('span');
              dot.textContent = '·';
              dot.style.opacity = '0.65';
              dot.style.margin = '0 0.08em';
              group.append(dot);
            }
          });

          codeNode.replaceWith(group);
          return;
        }

        if (raw.includes(' ')) return;
        if (!raw.includes('.') && !iconMap[raw]) return;

        const src = iconUrl(raw);
        if (!src) return;

        const chip = document.createElement('span');
        chip.className = 'sf-icon';
        chip.title = raw;

        const img = document.createElement('img');
        img.src = src;
        img.alt = `${raw} icon`;
        img.loading = 'lazy';
        chip.append(img);
        codeNode.replaceWith(chip);
      });
    }

    function applySectionCards(container) {
      const headings = [...container.querySelectorAll('h2')];
      headings.forEach((heading) => {
        const section = document.createElement('section');
        section.className = 'doc-section';
        heading.before(section);
        section.appendChild(heading);

        let next = section.nextSibling;
        while (next && !(next.nodeType === 1 && next.tagName === 'H2')) {
          const moving = next;
          next = next.nextSibling;
          section.appendChild(moving);
        }
      });
    }

    function buildToc(container) {
      const toc = document.getElementById('toc');
      toc.innerHTML = '';

      const slugCounts = {};
      const headings = [...container.querySelectorAll('h2, h3')];
      headings.forEach((heading) => {
        const base = slugify(heading.textContent || 'section');
        const count = (slugCounts[base] || 0) + 1;
        slugCounts[base] = count;
        heading.id = count === 1 ? base : `${base}-${count}`;

        const a = document.createElement('a');
        a.href = `#${heading.id}`;
        a.textContent = heading.textContent || '';

        const text = (heading.textContent || '').trim();
        const numbered = text.match(/^(\d+(?:\.\d+)+)\b/);
        let depth = 0;
        if (heading.tagName === 'H3') depth = 1;
        if (numbered) {
          const parts = numbered[1].split('.');
          depth = Math.max(depth, parts.length - 1);
        }
        if (depth > 0) {
          a.style.paddingLeft = `${10 + depth * 12}px`;
        }
        a.classList.add(`toc-l${Math.min(depth, 2)}`);

        toc.appendChild(a);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const id = entry.target.getAttribute('id');
          const link = toc.querySelector(`a[href="#${id}"]`);
          if (!link) return;
          if (entry.isIntersecting) {
            toc.querySelectorAll('a').forEach((n) => n.classList.remove('active'));
            link.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px', threshold: 0.01 });

      headings.forEach((h) => observer.observe(h));
    }

    const langConfig = {
      en: {
        file: 'en.md',
        disclaimer: 'This document is AI-generated and may contain mistakes or outdated details. If something looks wrong, contact <a href="mailto:feioustudio@gmail.com?subject=Projectholic%20Docs%20Issue">feioustudio@gmail.com</a>.',
        supportText: 'Contact support',
        supportSubject: 'Projectholic Docs Issue (English)',
        tocTitle: 'Contents'
      },
      'zh-Hans': {
        file: 'zh.md',
        disclaimer: '此文件由 AI 生成，可能存在错误或过时内容。如有问题，请联系 <a href="mailto:feioustudio@gmail.com?subject=Projectholic%20Docs%20Issue%20(Chinese)">feioustudio@gmail.com</a>。',
        supportText: '联系支持',
        supportSubject: 'Projectholic Docs Issue (Chinese)',
        tocTitle: '目录'
      }
    };

    async function loadMarkdown(lang) {
      const config = langConfig[lang] || langConfig.en;
      try {
        const response = await fetch(config.file, { cache: 'no-cache' });
        if (response.ok) return (await response.text()).trim();
      } catch (fetchError) {
        // Fall through to empty-state below.
      }
      return '';
    }

    function updateLanguageUI(lang) {
      document.documentElement.lang = lang === 'zh-Hans' ? 'zh-Hans' : 'en';
      document.getElementById('langEn').classList.toggle('active', lang === 'en');
      document.getElementById('langZh').classList.toggle('active', lang === 'zh-Hans');

      const config = langConfig[lang] || langConfig.en;
      const supportLink = document.getElementById('supportLink');
      supportLink.textContent = config.supportText;
      supportLink.href = `mailto:feioustudio@gmail.com?subject=${encodeURIComponent(config.supportSubject)}`;
      const sidebarTitle = document.querySelector('.sidebar h2');
      if (sidebarTitle) sidebarTitle.textContent = config.tocTitle;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatInlineMarkdown(raw) {
      const placeholders = [];
      let tokenized = raw;

      // Preserve backtick code spans.
      tokenized = tokenized.replace(/`([^`]+)`/g, (_, inner) => {
        const key = `%%PH_${placeholders.length}%%`;
        placeholders.push(`<code>${escapeHtml(inner)}</code>`);
        return key;
      });

      // Also treat quoted SF-symbol names like 'arrow.backward' or ‘arrow.backward’.
      tokenized = tokenized.replace(/[\'‘’]([a-z][a-z0-9]*(?:\.[a-z0-9]+)+)[\'‘’]/gi, (_, inner) => {
        const key = `%%PH_${placeholders.length}%%`;
        placeholders.push(`<code>${escapeHtml(inner)}</code>`);
        return key;
      });

      let html = escapeHtml(tokenized);
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/%%PH_(\d+)%%/g, (_, idx) => placeholders[Number(idx)] || '');
      return html;
    }

    function simpleMarkdownToHtml(markdown) {
      const lines = markdown.replace(/\r\n/g, '\n').split('\n');
      const out = [];
      let inUl = false;
      let inOl = false;
      let inCode = false;
      let paragraph = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        out.push(`<p>${paragraph.join(' ')}</p>`);
        paragraph = [];
      };
      const closeLists = () => {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
      };

      for (const rawLine of lines) {
        const line = rawLine;
        const trimmed = line.trim();

        if (trimmed.startsWith('```')) {
          flushParagraph();
          closeLists();
          if (!inCode) {
            out.push('<pre><code>');
            inCode = true;
          } else {
            out.push('</code></pre>');
            inCode = false;
          }
          continue;
        }

        if (inCode) {
          out.push(escapeHtml(line));
          continue;
        }

        if (!trimmed) {
          flushParagraph();
          closeLists();
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          flushParagraph();
          closeLists();
          out.push('<hr>');
          continue;
        }

        const heading = trimmed.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          closeLists();
          const level = heading[1].length;
          out.push(`<h${level}>${formatInlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const ol = trimmed.match(/^(\d+)\.\s+(.*)$/);
        if (ol) {
          flushParagraph();
          if (inUl) { out.push('</ul>'); inUl = false; }
          if (!inOl) { out.push('<ol>'); inOl = true; }
          out.push(`<li>${formatInlineMarkdown(ol[2])}</li>`);
          continue;
        }

        const ul = trimmed.match(/^-\s+(.*)$/);
        if (ul) {
          flushParagraph();
          if (inOl) { out.push('</ol>'); inOl = false; }
          if (!inUl) { out.push('<ul>'); inUl = true; }
          out.push(`<li>${formatInlineMarkdown(ul[1])}</li>`);
          continue;
        }

        closeLists();
        let text = formatInlineMarkdown(trimmed);
        paragraph.push(text);
      }

      flushParagraph();
      closeLists();
      if (inCode) out.push('</code></pre>');
      return out.join('\n');
    }

    function renderMarkdown(markdown) {
      if (window.marked) {
        if (typeof window.marked.parse === 'function') {
          return window.marked.parse(markdown);
        }
        if (typeof window.marked === 'function') {
          return window.marked(markdown);
        }
      }
      return simpleMarkdownToHtml(markdown);
    }

    async function renderDocs(lang) {
      const doc = document.getElementById('doc');

      try {
        const config = langConfig[lang] || langConfig.en;
        const markdown = await loadMarkdown(lang);
        if (!markdown) {
          throw new Error('Guide content is unavailable.');
        }

        const html = renderMarkdown(markdown);
        doc.innerHTML = `${html}<p class="doc-disclaimer">${config.disclaimer}</p>`;

        applyIconChips(doc);
        applySectionCards(doc);
        buildToc(doc);
        updateLanguageUI(lang);
      } catch (error) {
        doc.innerHTML = `<div class="error">Could not load documentation. ${error.message}</div>`;
      }
    }

    function initDocs() {
      const browserLang = (navigator.language || '').toLowerCase();
      const initialLang = browserLang.startsWith('zh') ? 'zh-Hans' : 'en';

      document.getElementById('langEn').addEventListener('click', () => renderDocs('en'));
      document.getElementById('langZh').addEventListener('click', () => renderDocs('zh-Hans'));

      renderDocs(initialLang);
    }

    initDocs();
  </script>
</body>
</html>
